version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: techcontrol_db
    environment:
      POSTGRES_USER: techcontrol
      POSTGRES_PASSWORD: techcontrol_pass
      POSTGRES_DB: techcontrol_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techcontrol -d techcontrol_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - techcontrol-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techcontrol_backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://techcontrol:techcontrol_pass@db:5432/techcontrol_db?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - PORT=8080
      - GIN_MODE=release
    depends_on:
      db:
        condition: service_healthy
    networks:
      - techcontrol-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=/api
    container_name: techcontrol_frontend
    ports:
      - "80:80"
    environment:
      - REACT_APP_API_URL=/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - techcontrol-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  techcontrol-network:
    driver: bridge

volumes:
  postgres_data:
